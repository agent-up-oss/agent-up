version: 2

updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      avalonia:
        patterns:
          - "Avalonia*"
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      semantic-release:
        patterns:
          - "semantic-release"
          - "@semantic-release/*"
          - "conventional-changelog-*"

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
      day: monday
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
          - "react"
          - "react-dom"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
