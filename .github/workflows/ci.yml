name: Agent-Up CI

on: [push]

concurrency:
  group: >-
    ${{ github.ref == 'refs/heads/main'
      && format('{0}-main-release', github.workflow)
      || format('{0}-{1}-{2}', github.workflow, github.ref, github.run_id) }}
  queue: max

permissions:
  contents: read

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.plan.outputs.version }}
      publish: ${{ steps.plan.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install release tooling
        run: npm install

      - name: Plan version
        id: plan
        run: node .github/scripts/plan-version.js

  dotnet-build-test:
    name: .NET build, tests, and payloads
    runs-on: ubuntu-latest
    needs: version
    permissions:
      actions: read
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: |
          dotnet build "agent-up.sln" --configuration Release

      - name: Install Ubuntu browser test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils dbus-x11 at-spi2-core libgtk-3-0
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-0 libwebkit2gtk-4.1-dev
            webkit_lib="$(ldconfig -p | awk '/libwebkit2gtk-4.1.so/{print $NF; exit}')"
          else
            sudo apt-get install -y libwebkit2gtk-4.0-37 libwebkit2gtk-4.0-dev
            webkit_lib="$(ldconfig -p | awk '/libwebkit2gtk-4.0.so/{print $NF; exit}')"
          fi
          if [ -n "$webkit_lib" ] && [ ! -e /usr/local/lib/libwebkit2gtk.so ]; then
            sudo ln -s "$webkit_lib" /usr/local/lib/libwebkit2gtk.so
            sudo ldconfig
          fi

      - name: Run tests
        shell: bash
        run: |
          found_tests=false

          while IFS= read -r -d "" test_project; do
            found_tests=true
            test_project_name="$(basename "$(dirname "$test_project")")"
            test_command=(
              dotnet test "$test_project"
              --configuration Release
              --no-build
              --settings "coverlet.runsettings"
              --logger "trx;LogFileName=test-results.trx"
              --collect:"XPlat Code Coverage"
            )

            if [ "$test_project_name" = "AgentUp.Tests" ]; then
              test_command+=(--blame-hang --blame-hang-timeout 120s)
              test_status=1
              for attempt in 1 2; do
                echo "Running AgentUp.Tests on Ubuntu attempt $attempt/2"
                if LIBGL_ALWAYS_SOFTWARE=1 \
                  GALLIUM_DRIVER=llvmpipe \
                  WEBKIT_DISABLE_COMPOSITING_MODE=1 \
                  WEBKIT_DISABLE_DMABUF_RENDERER=1 \
                  xvfb-run -a --server-args="-screen 0 1280x720x24 -ac +extension GLX +render -noreset" "${test_command[@]}"; then
                  test_status=0
                  break
                else
                  test_status=$?
                fi
              done
              if [ "$test_status" -ne 0 ]; then
                exit "$test_status"
              fi
            else
              "${test_command[@]}"
            fi
          done < <(find . -name "*Tests.csproj" -print0 | sort -z)

          if [ "$found_tests" = false ]; then
            echo "No test projects found"
            exit 1
          fi

      - name: Generate SBOM
        run: |
          dotnet tool install --global CycloneDX
          dotnet CycloneDX agent-up.sln --json --out artifacts/sbom --set-version "${{ needs.version.outputs.version }}"
          mv artifacts/sbom/bom.json artifacts/sbom/agent-up-sbom.cdx.json

      - name: Publish .NET CI artifacts
        shell: bash
        run: |
          ./.github/scripts/publish-dotnet-ci-artifacts.sh "${{ needs.version.outputs.version }}" "artifacts/dotnet-ci"

      - name: Prepare per-platform .NET CI artifacts
        shell: bash
        run: |
          rm -rf artifacts/ci-transfer
          for entry in \
            ubuntu-linux-x64:linux-x64 \
            nixos-linux-x64:linux-x64 \
            macos-osx-arm64:osx-arm64 \
            macos-osx-x64:osx-x64 \
            windows-win-x64:win-x64
          do
            platform_rid="${entry%%:*}"
            rid="${entry##*:}"
            target="artifacts/ci-transfer/$platform_rid/dotnet-ci"
            mkdir -p "$target/tools/$rid" "$target/payloads"
            cp -a "artifacts/dotnet-ci/tools/$rid/packaging" "$target/tools/$rid/"
            cp -a "artifacts/dotnet-ci/tools/$rid/package-smoke" "$target/tools/$rid/"
            cp -a "artifacts/dotnet-ci/payloads/$rid" "$target/payloads/"
          done

      - uses: actions/upload-artifact@v7
        with:
          name: dotnet-ci-ubuntu-linux-x64
          path: artifacts/ci-transfer/ubuntu-linux-x64/dotnet-ci
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v7
        with:
          name: dotnet-ci-nixos-linux-x64
          path: artifacts/ci-transfer/nixos-linux-x64/dotnet-ci
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v7
        with:
          name: dotnet-ci-macos-osx-arm64
          path: artifacts/ci-transfer/macos-osx-arm64/dotnet-ci
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v7
        with:
          name: dotnet-ci-macos-osx-x64
          path: artifacts/ci-transfer/macos-osx-x64/dotnet-ci
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v7
        with:
          name: dotnet-ci-windows-win-x64
          path: artifacts/ci-transfer/windows-win-x64/dotnet-ci
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: artifacts/sbom/agent-up-sbom.cdx.json
          if-no-files-found: error
          retention-days: 1

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: .NET Tests (Agent-Up)
          path: "**/test-results.trx"
          reporter: dotnet-trx

  platform:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: [dotnet-build-test, version]
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu package
            os: ubuntu-latest
            platform: ubuntu
            rid: linux-x64
            use-nix: false
          - name: NixOS package
            os: ubuntu-latest
            platform: nixos
            rid: linux-x64
            use-nix: true
          - name: macOS Apple Silicon package
            os: macos-latest
            platform: macos
            rid: osx-arm64
            use-nix: false
          - name: macOS Intel package
            os: macos-15-intel
            platform: macos
            rid: osx-x64
            use-nix: false
          - name: Windows package
            os: windows-latest
            platform: windows
            rid: win-x64
            use-nix: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@v22
        if: ${{ matrix.use-nix }}

      - uses: actions/download-artifact@v8
        with:
          name: dotnet-ci-${{ matrix.platform }}-${{ matrix.rid }}
          path: dotnet-ci

      - name: Delete consumed .NET CI artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact_name="dotnet-ci-${{ matrix.platform }}-${{ matrix.rid }}"
          artifact_id="$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --paginate --jq ".artifacts[] | select(.name == \"$artifact_name\") | .id" | head -n 1)"
          if [ -n "$artifact_id" ]; then
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$artifact_id"
          fi

      - name: Mark downloaded tools executable
        shell: bash
        run: |
          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x "dotnet-ci/tools/${{ matrix.rid }}/packaging/AgentUp.Packaging" || true
            chmod +x "dotnet-ci/tools/${{ matrix.rid }}/package-smoke/AgentUp.PackageSmoke" || true
            chmod +x "dotnet-ci/payloads/${{ matrix.rid }}/installer/AgentUp.InstallerApp" || true
            chmod +x "dotnet-ci/payloads/${{ matrix.rid }}/desktop/AgentUp.Desktop" || true
            chmod +x "dotnet-ci/payloads/${{ matrix.rid }}/server/AgentUp.Server" || true
            chmod +x "dotnet-ci/payloads/${{ matrix.rid }}/cli/AgentUp.CLI" || true
          fi

      - name: Package release artifact
        shell: bash
        run: |
          tool_suffix=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            tool_suffix=".exe"
          fi
          export AGENTUP_PACKAGING_COMMAND="$PWD/dotnet-ci/tools/${{ matrix.rid }}/packaging/AgentUp.Packaging$tool_suffix"
          ./scripts/package-release.sh "${{ matrix.platform }}" "${{ matrix.rid }}" "${{ needs.version.outputs.version }}" "release-artifacts" \
            --payload-root "$PWD/dotnet-ci/payloads/${{ matrix.rid }}"

      - name: Smoke test packaged artifact
        shell: bash
        run: |
          tool_suffix=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            tool_suffix=".exe"
          fi
          export AGENTUP_PACKAGE_SMOKE_COMMAND="$PWD/dotnet-ci/tools/${{ matrix.rid }}/package-smoke/AgentUp.PackageSmoke$tool_suffix"
          ./.github/scripts/smoke-package.sh "${{ matrix.platform }}" "${{ matrix.rid }}" "release-artifacts"

      - name: Smoke test guided installer flow
        if: ${{ matrix.platform != 'nixos' }}
        shell: bash
        run: |
          tool_suffix=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            tool_suffix=".exe"
          fi
          export AGENTUP_PACKAGE_SMOKE_COMMAND="$PWD/dotnet-ci/tools/${{ matrix.rid }}/package-smoke/AgentUp.PackageSmoke$tool_suffix"
          export AGENTUP_INSTALLER_APP_COMMAND="$PWD/dotnet-ci/payloads/${{ matrix.rid }}/installer/AgentUp.InstallerApp$tool_suffix"
          export AGENTUP_INSTALLER_FAKE=1
          ./.github/scripts/smoke-installer-flow.sh "${{ matrix.platform }}" "$PWD/dotnet-ci/payloads/${{ matrix.rid }}"

      - name: Switch Windows Docker to Linux containers
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          $dockerCli = Join-Path $env:ProgramFiles 'Docker\Docker\DockerCli.exe'
          if (-not (Test-Path $dockerCli)) {
            throw "DockerCli.exe was not found at $dockerCli; cannot switch Docker to Linux containers."
          }

          & $dockerCli -SwitchLinuxEngine

          $deadline = (Get-Date).AddMinutes(3)
          do {
            Start-Sleep -Seconds 5
            $osType = ''
            try {
              $osType = (docker info --format '{{.OSType}}' 2>$null).Trim()
            } catch {
              $osType = ''
            }
            if ($osType -eq 'linux') {
              docker version
              exit 0
            }
          } while ((Get-Date) -lt $deadline)

          docker info
          throw "Docker did not switch to Linux containers before timeout."

      - name: Smoke test installed service
        shell: bash
        run: |
          tool_suffix=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            tool_suffix=".exe"
          fi
          export AGENTUP_PACKAGE_SMOKE_COMMAND="$PWD/dotnet-ci/tools/${{ matrix.rid }}/package-smoke/AgentUp.PackageSmoke$tool_suffix"
          ./.github/scripts/smoke-installed-service.sh "${{ matrix.platform }}" "${{ matrix.rid }}" "release-artifacts"

      - uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.platform }}-${{ matrix.rid }}
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 1

  docs:
    name: Docs
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Build docs
        run: |
          npm --prefix docs ci
          npm --prefix docs run build

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [platform, docs, version]
    if: ${{ github.ref == 'refs/heads/main' && needs.version.outputs.publish == 'true' }}
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install release tooling
        run: npm install

      - uses: actions/download-artifact@v8
        with:
          pattern: package-*
          path: release-artifacts
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          name: sbom
          path: release-artifacts

      - name: Delete consumed package and SBOM artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --paginate --jq '.artifacts[] | select(.name | startswith("package-") or .name == "sbom") | .id' |
            while IFS= read -r artifact_id; do
              if [ -n "$artifact_id" ]; then
                gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$artifact_id"
              fi
            done

      - name: Prepare release artifacts
        run: ./.github/scripts/upload-release-artifacts.sh "${{ needs.version.outputs.version }}"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
